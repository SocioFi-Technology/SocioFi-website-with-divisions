<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C0C1D"/><stop offset="100%" stop-color="#111128"/>
    </linearGradient>
    <radialGradient id="glow" cx="400" cy="225" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7B6FE8" stop-opacity="0.1"/><stop offset="100%" stop-color="#7B6FE8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/><rect width="800" height="450" fill="url(#glow)"/>
  <!-- Matching interface -->
  <!-- Left card -->
  <rect x="150" y="100" width="200" height="250" rx="14" fill="#161636" stroke="#7B6FE8" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="170" y="120" width="160" height="100" rx="8" fill="#7B6FE8" fill-opacity="0.06"/>
  <circle cx="250" cy="170" r="25" fill="#7B6FE8" fill-opacity="0.1" stroke="#7B6FE8" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="180" y="240" width="120" height="7" rx="3.5" fill="#7B6FE8" fill-opacity="0.2"/>
  <rect x="180" y="256" width="80" height="5" rx="2.5" fill="#3A589E" fill-opacity="0.12"/>
  <rect x="180" y="275" width="140" height="5" rx="2.5" fill="#7B6FE8" fill-opacity="0.1"/>
  <rect x="180" y="290" width="100" height="5" rx="2.5" fill="#72C4B2" fill-opacity="0.08"/>
  <rect x="180" y="315" width="60" height="20" rx="6" fill="#7B6FE8" fill-opacity="0.15" stroke="#7B6FE8" stroke-opacity="0.2" stroke-width="0.5"/>
  <!-- Right card -->
  <rect x="450" y="100" width="200" height="250" rx="14" fill="#161636" stroke="#72C4B2" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="470" y="120" width="160" height="100" rx="8" fill="#72C4B2" fill-opacity="0.06"/>
  <circle cx="550" cy="170" r="25" fill="#72C4B2" fill-opacity="0.1" stroke="#72C4B2" stroke-opacity="0.2" stroke-width="1"/>
  <rect x="480" y="240" width="110" height="7" rx="3.5" fill="#72C4B2" fill-opacity="0.2"/>
  <rect x="480" y="256" width="90" height="5" rx="2.5" fill="#3A589E" fill-opacity="0.12"/>
  <rect x="480" y="275" width="130" height="5" rx="2.5" fill="#72C4B2" fill-opacity="0.1"/>
  <rect x="480" y="290" width="95" height="5" rx="2.5" fill="#7B6FE8" fill-opacity="0.08"/>
  <rect x="480" y="315" width="60" height="20" rx="6" fill="#72C4B2" fill-opacity="0.15" stroke="#72C4B2" stroke-opacity="0.2" stroke-width="0.5"/>
  <!-- AI matching connection -->
  <line x1="350" y1="170" x2="450" y2="170" stroke="#7B6FE8" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="350" y1="260" x2="450" y2="260" stroke="#72C4B2" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="4 3"/>
  <!-- Match score center -->
  <circle cx="400" cy="215" r="28" fill="#161636" stroke="#7B6FE8" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="400" y="220" text-anchor="middle" font-family="monospace" font-size="12" font-weight="700" fill="#7B6FE8" fill-opacity="0.5">97%</text>
  <circle cx="100" cy="130" r="2" fill="#7B6FE8" fill-opacity="0.2"/>
  <circle cx="720" cy="100" r="2.5" fill="#72C4B2" fill-opacity="0.2"/>
</svg>
