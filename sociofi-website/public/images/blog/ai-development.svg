<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C0C1D"/>
      <stop offset="100%" stop-color="#111128"/>
    </linearGradient>
    <radialGradient id="glow1" cx="300" cy="200" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#72C4B2" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#72C4B2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="550" cy="280" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A589E" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3A589E" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow1)"/>
  <rect width="800" height="450" fill="url(#glow2)"/>
  <!-- Grid -->
  <g stroke="#72C4B2" stroke-opacity="0.04" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/><line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/><line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="450"/><line x1="320" y1="0" x2="320" y2="450"/>
    <line x1="480" y1="0" x2="480" y2="450"/><line x1="640" y1="0" x2="640" y2="450"/>
  </g>
  <!-- Terminal window -->
  <rect x="180" y="80" width="440" height="290" rx="12" fill="#161636" stroke="#72C4B2" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="180" y="80" width="440" height="32" rx="12" fill="#1a1a3a"/>
  <circle cx="202" cy="96" r="5" fill="#E8916F" fill-opacity="0.7"/>
  <circle cx="218" cy="96" r="5" fill="#E8B84D" fill-opacity="0.7"/>
  <circle cx="234" cy="96" r="5" fill="#72C4B2" fill-opacity="0.7"/>
  <!-- Code lines -->
  <rect x="210" y="132" width="120" height="8" rx="4" fill="#7B6FE8" fill-opacity="0.4"/>
  <rect x="340" y="132" width="80" height="8" rx="4" fill="#72C4B2" fill-opacity="0.3"/>
  <rect x="210" y="156" width="60" height="8" rx="4" fill="#E8B84D" fill-opacity="0.35"/>
  <rect x="280" y="156" width="160" height="8" rx="4" fill="#72C4B2" fill-opacity="0.25"/>
  <rect x="230" y="180" width="100" height="8" rx="4" fill="#6BA3E8" fill-opacity="0.35"/>
  <rect x="340" y="180" width="50" height="8" rx="4" fill="#E8916F" fill-opacity="0.3"/>
  <rect x="230" y="204" width="180" height="8" rx="4" fill="#72C4B2" fill-opacity="0.2"/>
  <rect x="210" y="228" width="40" height="8" rx="4" fill="#E8B84D" fill-opacity="0.35"/>
  <rect x="210" y="252" width="140" height="8" rx="4" fill="#7B6FE8" fill-opacity="0.3"/>
  <rect x="360" y="252" width="90" height="8" rx="4" fill="#72C4B2" fill-opacity="0.35"/>
  <rect x="210" y="276" width="60" height="8" rx="4" fill="#6BA3E8" fill-opacity="0.3"/>
  <rect x="280" y="276" width="120" height="8" rx="4" fill="#E8916F" fill-opacity="0.25"/>
  <!-- Cursor blink -->
  <rect x="210" y="300" width="2" height="14" fill="#72C4B2" fill-opacity="0.8"/>
  <!-- Floating particles -->
  <circle cx="120" cy="150" r="3" fill="#72C4B2" fill-opacity="0.3"/>
  <circle cx="680" cy="120" r="2" fill="#7B6FE8" fill-opacity="0.4"/>
  <circle cx="700" cy="350" r="4" fill="#72C4B2" fill-opacity="0.2"/>
  <circle cx="100" cy="380" r="2.5" fill="#3A589E" fill-opacity="0.35"/>
  <!-- Connection lines -->
  <line x1="120" y1="150" x2="180" y2="180" stroke="#72C4B2" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="680" y1="120" x2="620" y2="132" stroke="#7B6FE8" stroke-opacity="0.08" stroke-width="1"/>
</svg>
