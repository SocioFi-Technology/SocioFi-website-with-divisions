<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C0C1D"/>
      <stop offset="100%" stop-color="#111128"/>
    </linearGradient>
    <radialGradient id="glow" cx="400" cy="225" r="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8B84D" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#E8B84D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <!-- Step indicators -->
  <!-- Step 1 -->
  <circle cx="200" cy="120" r="24" fill="#161636" stroke="#E8B84D" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="200" y="126" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#E8B84D" fill-opacity="0.6">1</text>
  <rect x="168" y="155" width="64" height="6" rx="3" fill="#E8B84D" fill-opacity="0.2"/>
  <rect x="174" y="168" width="52" height="4" rx="2" fill="#E8B84D" fill-opacity="0.1"/>
  <!-- Connector 1-2 -->
  <line x1="224" y1="120" x2="276" y2="120" stroke="#E8B84D" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M270 115 L278 120 L270 125" stroke="#E8B84D" stroke-opacity="0.2" stroke-width="1" fill="none"/>
  <!-- Step 2 -->
  <circle cx="310" cy="120" r="24" fill="#161636" stroke="#72C4B2" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="310" y="126" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#72C4B2" fill-opacity="0.6">2</text>
  <rect x="278" y="155" width="64" height="6" rx="3" fill="#72C4B2" fill-opacity="0.2"/>
  <rect x="284" y="168" width="52" height="4" rx="2" fill="#72C4B2" fill-opacity="0.1"/>
  <!-- Connector 2-3 -->
  <line x1="334" y1="120" x2="386" y2="120" stroke="#72C4B2" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M380 115 L388 120 L380 125" stroke="#72C4B2" stroke-opacity="0.2" stroke-width="1" fill="none"/>
  <!-- Step 3 -->
  <circle cx="420" cy="120" r="24" fill="#161636" stroke="#E8B84D" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="420" y="126" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#E8B84D" fill-opacity="0.6">3</text>
  <rect x="388" y="155" width="64" height="6" rx="3" fill="#E8B84D" fill-opacity="0.2"/>
  <rect x="394" y="168" width="52" height="4" rx="2" fill="#E8B84D" fill-opacity="0.1"/>
  <!-- Connector 3-4 -->
  <line x1="444" y1="120" x2="496" y2="120" stroke="#E8B84D" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 3"/>
  <path d="M490 115 L498 120 L490 125" stroke="#E8B84D" stroke-opacity="0.2" stroke-width="1" fill="none"/>
  <!-- Step 4 -->
  <circle cx="530" cy="120" r="24" fill="#161636" stroke="#72C4B2" stroke-opacity="0.6" stroke-width="1.5"/>
  <text x="530" y="126" text-anchor="middle" font-family="monospace" font-size="14" font-weight="700" fill="#72C4B2" fill-opacity="0.7">4</text>
  <rect x="498" y="155" width="64" height="6" rx="3" fill="#72C4B2" fill-opacity="0.2"/>
  <rect x="504" y="168" width="52" height="4" rx="2" fill="#72C4B2" fill-opacity="0.1"/>
  <!-- Code snippet panel -->
  <rect x="180" y="210" width="440" height="180" rx="10" fill="#161636" stroke="#E8B84D" stroke-opacity="0.12" stroke-width="1"/>
  <rect x="180" y="210" width="440" height="28" rx="10" fill="#1a1a3a"/>
  <circle cx="200" cy="224" r="4" fill="#E8916F" fill-opacity="0.5"/>
  <circle cx="214" cy="224" r="4" fill="#E8B84D" fill-opacity="0.5"/>
  <circle cx="228" cy="224" r="4" fill="#72C4B2" fill-opacity="0.5"/>
  <!-- Code lines with highlighted step -->
  <rect x="205" y="252" width="30" height="6" rx="3" fill="#E8B84D" fill-opacity="0.15"/>
  <rect x="205" y="252" width="3" height="6" rx="1.5" fill="#E8B84D" fill-opacity="0.5"/>
  <rect x="245" y="252" width="120" height="6" rx="3" fill="#E8B84D" fill-opacity="0.25"/>
  <rect x="205" y="270" width="80" height="6" rx="3" fill="#72C4B2" fill-opacity="0.2"/>
  <rect x="295" y="270" width="60" height="6" rx="3" fill="#7B6FE8" fill-opacity="0.2"/>
  <rect x="225" y="288" width="140" height="6" rx="3" fill="#E8B84D" fill-opacity="0.15"/>
  <rect x="225" y="306" width="100" height="6" rx="3" fill="#72C4B2" fill-opacity="0.18"/>
  <rect x="335" y="306" width="50" height="6" rx="3" fill="#E8916F" fill-opacity="0.15"/>
  <rect x="205" y="324" width="60" height="6" rx="3" fill="#E8B84D" fill-opacity="0.25"/>
  <rect x="275" y="324" width="90" height="6" rx="3" fill="#72C4B2" fill-opacity="0.2"/>
  <!-- Highlight bar on active step -->
  <rect x="180" y="246" width="3" height="22" fill="#E8B84D" fill-opacity="0.5" rx="1.5"/>
  <!-- Floating -->
  <circle cx="100" cy="100" r="2" fill="#E8B84D" fill-opacity="0.25"/>
  <circle cx="720" cy="130" r="3" fill="#72C4B2" fill-opacity="0.2"/>
  <circle cx="80" cy="380" r="2.5" fill="#E8B84D" fill-opacity="0.15"/>
  <circle cx="730" cy="400" r="2" fill="#72C4B2" fill-opacity="0.2"/>
</svg>
