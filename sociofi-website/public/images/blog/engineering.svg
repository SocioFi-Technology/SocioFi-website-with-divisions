  <ellipse cx="400" cy="388" rx="30" ry="10" fill="#161636" stroke="#72C4B2" stroke-opacity="0.3" stroke-width="1"/>
  <ellipse cx="560" cy="388" rx="30" ry="10" fill="#161636" stroke="#7B6FE8" stroke-opacity="0.25" stroke-width="1"/>
