<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C0C1D"/>
      <stop offset="100%" stop-color="#111128"/>
    </linearGradient>
    <radialGradient id="glow" cx="400" cy="280" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6BA3E8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#6BA3E8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <!-- Grid -->
  <g stroke="#6BA3E8" stroke-opacity="0.03" stroke-width="0.5">
    <line x1="0" y1="90" x2="800" y2="90"/><line x1="0" y1="180" x2="800" y2="180"/>
    <line x1="0" y1="270" x2="800" y2="270"/><line x1="0" y1="360" x2="800" y2="360"/>
  </g>
  <!-- Chart area -->
  <rect x="150" y="80" width="500" height="300" rx="12" fill="#161636" stroke="#6BA3E8" stroke-opacity="0.12" stroke-width="1"/>
  <!-- Y axis labels -->
  <rect x="165" y="110" width="20" height="4" rx="2" fill="#6BA3E8" fill-opacity="0.2"/>
  <rect x="165" y="170" width="20" height="4" rx="2" fill="#6BA3E8" fill-opacity="0.2"/>
  <rect x="165" y="230" width="20" height="4" rx="2" fill="#6BA3E8" fill-opacity="0.2"/>
  <rect x="165" y="290" width="20" height="4" rx="2" fill="#6BA3E8" fill-opacity="0.2"/>
  <!-- Horizontal grid lines -->
  <line x1="195" y1="112" x2="630" y2="112" stroke="#6BA3E8" stroke-opacity="0.04" stroke-width="0.5"/>
  <line x1="195" y1="172" x2="630" y2="172" stroke="#6BA3E8" stroke-opacity="0.04" stroke-width="0.5"/>
  <line x1="195" y1="232" x2="630" y2="232" stroke="#6BA3E8" stroke-opacity="0.04" stroke-width="0.5"/>
  <line x1="195" y1="292" x2="630" y2="292" stroke="#6BA3E8" stroke-opacity="0.04" stroke-width="0.5"/>
  <!-- Growth curve -->
  <path d="M210 330 C250 325, 280 310, 310 290 S370 240, 400 210 S450 150, 480 130 S540 105, 600 95" stroke="#6BA3E8" stroke-width="2.5" stroke-opacity="0.6" stroke-linecap="round" fill="none"/>
  <!-- Area under curve -->
  <path d="M210 330 C250 325, 280 310, 310 290 S370 240, 400 210 S450 150, 480 130 S540 105, 600 95 L600 350 L210 350 Z" fill="#6BA3E8" fill-opacity="0.04"/>
  <!-- Data points -->
  <circle cx="310" cy="290" r="4" fill="#161636" stroke="#6BA3E8" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="400" cy="210" r="5" fill="#161636" stroke="#72C4B2" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="480" cy="130" r="4" fill="#161636" stroke="#6BA3E8" stroke-width="1.5" stroke-opacity="0.5"/>
  <circle cx="600" cy="95" r="6" fill="#161636" stroke="#6BA3E8" stroke-width="2" stroke-opacity="0.7"/>
  <!-- Secondary line -->
  <path d="M210 340 C280 335, 330 320, 380 300 S460 260, 520 240 S580 220, 600 210" stroke="#72C4B2" stroke-width="1.5" stroke-opacity="0.35" stroke-linecap="round" stroke-dasharray="6 4" fill="none"/>
  <!-- Legend -->
  <rect x="440" y="350" width="16" height="3" rx="1.5" fill="#6BA3E8" fill-opacity="0.5"/>
  <rect x="462" y="348" width="40" height="6" rx="3" fill="#6BA3E8" fill-opacity="0.15"/>
  <rect x="520" y="350" width="16" height="3" rx="1.5" fill="#72C4B2" fill-opacity="0.4"/>
  <rect x="542" y="348" width="40" height="6" rx="3" fill="#72C4B2" fill-opacity="0.12"/>
  <!-- Floating elements -->
  <circle cx="100" cy="150" r="2.5" fill="#6BA3E8" fill-opacity="0.2"/>
  <circle cx="720" cy="100" r="3" fill="#72C4B2" fill-opacity="0.15"/>
  <circle cx="80" cy="380" r="2" fill="#6BA3E8" fill-opacity="0.25"/>
  <circle cx="730" cy="370" r="2.5" fill="#72C4B2" fill-opacity="0.2"/>
