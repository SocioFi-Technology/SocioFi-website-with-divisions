<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C0C1D"/>
      <stop offset="100%" stop-color="#111128"/>
    </linearGradient>
    <radialGradient id="glow" cx="400" cy="225" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7B6FE8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7B6FE8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <!-- Particle field -->
  <g fill="#7B6FE8">
    <circle cx="200" cy="100" r="4" fill-opacity="0.35"/>
    <circle cx="340" cy="80" r="3" fill-opacity="0.25"/>
    <circle cx="480" cy="60" r="5" fill-opacity="0.3"/>
    <circle cx="600" cy="100" r="3.5" fill-opacity="0.2"/>
    <circle cx="150" cy="200" r="3" fill-opacity="0.2"/>
    <circle cx="280" cy="180" r="6" fill-opacity="0.35"/>
    <circle cx="400" cy="160" r="4" fill-opacity="0.25"/>
    <circle cx="520" cy="190" r="5" fill-opacity="0.3"/>
    <circle cx="660" cy="170" r="3" fill-opacity="0.2"/>
    <circle cx="180" cy="300" r="5" fill-opacity="0.3"/>
    <circle cx="320" cy="280" r="4" fill-opacity="0.25"/>
    <circle cx="450" cy="310" r="6" fill-opacity="0.35"/>
    <circle cx="570" cy="270" r="3.5" fill-opacity="0.2"/>
    <circle cx="680" cy="300" r="4" fill-opacity="0.25"/>
    <circle cx="240" cy="380" r="3" fill-opacity="0.2"/>
    <circle cx="400" cy="400" r="4" fill-opacity="0.15"/>
    <circle cx="550" cy="380" r="5" fill-opacity="0.25"/>
  </g>
  <g fill="#72C4B2">
    <circle cx="260" cy="140" r="3" fill-opacity="0.25"/>
    <circle cx="440" cy="120" r="4" fill-opacity="0.2"/>
    <circle cx="350" cy="240" r="5" fill-opacity="0.3"/>
    <circle cx="500" cy="340" r="3.5" fill-opacity="0.25"/>
    <circle cx="620" cy="230" r="4" fill-opacity="0.2"/>
    <circle cx="130" cy="360" r="3" fill-opacity="0.2"/>
  </g>
  <!-- Connection lines between nearby particles -->
  <g stroke="#7B6FE8" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="200" y1="100" x2="260" y2="140"/>
    <line x1="260" y1="140" x2="280" y2="180"/>
    <line x1="280" y1="180" x2="340" y2="80"/>
    <line x1="340" y1="80" x2="400" y2="160"/>
    <line x1="400" y1="160" x2="440" y2="120"/>
    <line x1="440" y1="120" x2="480" y2="60"/>
    <line x1="480" y1="60" x2="520" y2="190"/>
    <line x1="520" y1="190" x2="600" y2="100"/>
    <line x1="280" y1="180" x2="350" y2="240"/>
    <line x1="350" y1="240" x2="320" y2="280"/>
    <line x1="320" y1="280" x2="450" y2="310"/>
    <line x1="450" y1="310" x2="500" y2="340"/>
    <line x1="450" y1="310" x2="570" y2="270"/>
    <line x1="570" y1="270" x2="620" y2="230"/>
    <line x1="620" y1="230" x2="680" y2="300"/>
    <line x1="620" y1="230" x2="660" y2="170"/>
    <line x1="180" y1="300" x2="320" y2="280"/>
    <line x1="180" y1="300" x2="240" y2="380"/>
  </g>
  <!-- Central research node -->
  <circle cx="400" cy="225" r="30" fill="#161636" stroke="#7B6FE8" stroke-opacity="0.4" stroke-width="2"/>
  <circle cx="400" cy="225" r="14" fill="#7B6FE8" fill-opacity="0.12"/>
  <circle cx="400" cy="225" r="5" fill="#7B6FE8" fill-opacity="0.4"/>
  <!-- Orbit ring -->
  <circle cx="400" cy="225" r="80" fill="none" stroke="#7B6FE8" stroke-opacity="0.06" stroke-width="1" stroke-dasharray="4 6"/>
</svg>
