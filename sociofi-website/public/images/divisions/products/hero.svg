<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C0C1D"/>
      <stop offset="100%" stop-color="#111128"/>
    </linearGradient>
    <radialGradient id="glow" cx="400" cy="225" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8916F" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#E8916F" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <rect width="800" height="450" fill="url(#glow)"/>
  <!-- Stacked product layers (products logo modifier = stacked diamonds) -->
  <!-- Bottom layer -->
  <path d="M400 340 L520 280 L400 220 L280 280 Z" fill="#161636" stroke="#E8916F" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M400 340 L520 280 L400 220 L280 280 Z" fill="#E8916F" fill-opacity="0.03"/>
  <!-- Middle layer -->
  <path d="M400 290 L520 230 L400 170 L280 230 Z" fill="#161636" stroke="#E8916F" stroke-opacity="0.3" stroke-width="1.5"/>
  <path d="M400 290 L520 230 L400 170 L280 230 Z" fill="#E8916F" fill-opacity="0.04"/>
  <!-- Top layer -->
  <path d="M400 240 L520 180 L400 120 L280 180 Z" fill="#161636" stroke="#E8916F" stroke-opacity="0.45" stroke-width="1.5"/>
  <path d="M400 240 L520 180 L400 120 L280 180 Z" fill="#E8916F" fill-opacity="0.06"/>
  <!-- Grid pattern on top layer -->
  <line x1="340" y1="150" x2="340" y2="210" stroke="#E8916F" stroke-opacity="0.05" stroke-width="0.5"/>
  <line x1="400" y1="120" x2="400" y2="240" stroke="#E8916F" stroke-opacity="0.06" stroke-width="0.5"/>
  <line x1="460" y1="150" x2="460" y2="210" stroke="#E8916F" stroke-opacity="0.05" stroke-width="0.5"/>
  <!-- Product UI elements on top -->
  <rect x="350" y="155" width="100" height="8" rx="4" fill="#E8916F" fill-opacity="0.2"/>
  <rect x="365" y="172" width="70" height="5" rx="2.5" fill="#72C4B2" fill-opacity="0.15"/>
  <!-- Connection points -->
  <circle cx="280" cy="180" r="5" fill="#161636" stroke="#E8916F" stroke-opacity="0.35" stroke-width="1"/>
  <circle cx="520" cy="180" r="5" fill="#161636" stroke="#E8916F" stroke-opacity="0.35" stroke-width="1"/>
  <circle cx="400" cy="120" r="6" fill="#161636" stroke="#E8916F" stroke-opacity="0.5" stroke-width="1.5"/>
  <!-- Feature lines extending out -->
  <line x1="275" y1="180" x2="180" y2="160" stroke="#E8916F" stroke-opacity="0.08" stroke-width="0.8"/>
  <line x1="525" y1="180" x2="620" y2="160" stroke="#E8916F" stroke-opacity="0.08" stroke-width="0.8"/>
  <!-- Feature labels -->
  <rect x="130" y="148" width="50" height="24" rx="6" fill="#161636" stroke="#E8916F" stroke-opacity="0.15" stroke-width="0.5"/>
  <rect x="140" y="155" width="30" height="4" rx="2" fill="#E8916F" fill-opacity="0.2"/>
  <rect x="140" y="163" width="20" height="3" rx="1.5" fill="#72C4B2" fill-opacity="0.12"/>
  <rect x="620" y="148" width="50" height="24" rx="6" fill="#161636" stroke="#E8916F" stroke-opacity="0.15" stroke-width="0.5"/>
  <rect x="630" y="155" width="30" height="4" rx="2" fill="#E8916F" fill-opacity="0.2"/>
  <rect x="630" y="163" width="20" height="3" rx="1.5" fill="#72C4B2" fill-opacity="0.12"/>
  <!-- Floating -->
  <circle cx="120" cy="100" r="2.5" fill="#E8916F" fill-opacity="0.2"/>
  <circle cx="700" cy="90" r="2" fill="#72C4B2" fill-opacity="0.2"/>
  <circle cx="100" cy="380" r="3" fill="#E8916F" fill-opacity="0.15"/>
  <circle cx="720" cy="390" r="2.5" fill="#E8B84D" fill-opacity="0.15"/>
</svg>
