  <line x1="382" y1="178" x2="260" y2="280" stroke="#E8B84D" stroke-opacity="0.15" stroke-width="1.5"/>
  <line x1="400" y1="184" x2="400" y2="280" stroke="#3A589E" stroke-opacity="0.18" stroke-width="1.5"/>
  <line x1="418" y1="178" x2="540" y2="280" stroke="#72C4B2" stroke-opacity="0.15" stroke-width="1.5"/>
  <!-- Branch nodes -->
  <rect x="210" y="280" width="100" height="65" rx="10" fill="#161636" stroke="#E8B84D" stroke-opacity="0.25" stroke-width="1"/>
