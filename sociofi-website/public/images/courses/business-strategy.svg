  <rect x="225" y="308" width="70" height="4" rx="2" fill="#E8B84D" fill-opacity="0.12"/>
  <rect x="225" y="320" width="50" height="4" rx="2" fill="#3A589E" fill-opacity="0.1"/>
  <rect x="350" y="280" width="100" height="65" rx="10" fill="#161636" stroke="#3A589E" stroke-opacity="0.3" stroke-width="1"/>
  <rect x="365" y="295" width="60" height="6" rx="3" fill="#3A589E" fill-opacity="0.25"/>
  <rect x="365" y="308" width="70" height="4" rx="2" fill="#3A589E" fill-opacity="0.12"/>
  <rect x="365" y="320" width="55" height="4" rx="2" fill="#72C4B2" fill-opacity="0.1"/>
  <rect x="490" y="280" width="100" height="65" rx="10" fill="#161636" stroke="#72C4B2" stroke-opacity="0.25" stroke-width="1"/>
  <rect x="505" y="295" width="65" height="6" rx="3" fill="#72C4B2" fill-opacity="0.25"/>
  <rect x="505" y="308" width="70" height="4" rx="2" fill="#72C4B2" fill-opacity="0.12"/>
  <rect x="505" y="320" width="45" height="4" rx="2" fill="#3A589E" fill-opacity="0.1"/>
  <!-- Sub-branches -->
  <line x1="230" y1="345" x2="200" y2="385" stroke="#E8B84D" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="280" y1="345" x2="310" y2="385" stroke="#E8B84D" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="200" cy="395" r="10" fill="#161636" stroke="#E8B84D" stroke-opacity="0.15" stroke-width="0.5"/>
  <circle cx="310" cy="395" r="10" fill="#161636" stroke="#E8B84D" stroke-opacity="0.15" stroke-width="0.5"/>
  <line x1="510" y1="345" x2="490" y2="385" stroke="#72C4B2" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="570" y1="345" x2="590" y2="385" stroke="#72C4B2" stroke-opacity="0.08" stroke-width="1"/>
  <circle cx="490" cy="395" r="10" fill="#161636" stroke="#72C4B2" stroke-opacity="0.15" stroke-width="0.5"/>
  <circle cx="590" cy="395" r="10" fill="#161636" stroke="#72C4B2" stroke-opacity="0.15" stroke-width="0.5"/>
  <!-- Growth arrow top right -->
  <path d="M580 100 Q620 90 650 60" stroke="#E8B84D" stroke-opacity="0.12" stroke-width="1.5" fill="none"/>
  <path d="M640 58 L652 56 L648 68" stroke="#E8B84D" stroke-opacity="0.15" stroke-width="1" fill="none"/>
  <circle cx="120" cy="100" r="2" fill="#3A589E" fill-opacity="0.2"/>
  <circle cx="700" cy="380" r="2.5" fill="#72C4B2" fill-opacity="0.15"/>
