<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C0C1D"/><stop offset="100%" stop-color="#111128"/>
    </linearGradient>
    <radialGradient id="glow" cx="400" cy="250" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3A589E" stop-opacity="0.1"/><stop offset="100%" stop-color="#E8B84D" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/><rect width="800" height="450" fill="url(#glow)"/>
  <!-- Strategy compass / decision tree -->
  <!-- Central node -->
  <circle cx="400" cy="160" r="24" fill="#161636" stroke="#3A589E" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="400" cy="160" r="10" fill="#3A589E" fill-opacity="0.15"/>
