# SocioFi Technology — nginx Reverse Proxy
#
# Domains:
#   sociofitechnology.com            → Next.js public website  (admin:3000)
#   superadmin.sociofitechnology.com → Next.js admin panel     (admin:3000, same container)
#   cms.sociofitechnology.com        → Next.js CMS             (cms:3001)
#
# SSL: managed by Certbot / Let's Encrypt.
# Run certbot once after first deploy:
#   docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
#     -d sociofitechnology.com -d www.sociofitechnology.com \
#     -d superadmin.sociofitechnology.com \
#     -d cms.sociofitechnology.com
#
# Then restart nginx: docker compose restart nginx

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
  gzip_min_length 1000;

  # ── Rate limiting ──────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/s;

  # ── Upstream ───────────────────────────────────────────────────────────────
  upstream nextjs {
    server admin:3000;
    keepalive 32;
  }

  upstream cms {
    server cms:3001;
    keepalive 16;
  }

  # ── HTTP → HTTPS redirect (all domains) ───────────────────────────────────
  server {
    listen 80;
    server_name sociofitechnology.com www.sociofitechnology.com superadmin.sociofitechnology.com cms.sociofitechnology.com;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── Public website: sociofitechnology.com ─────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name sociofitechnology.com www.sociofitechnology.com;

    ssl_certificate     /etc/letsencrypt/live/sociofitechnology.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sociofitechnology.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # www → non-www redirect
    if ($host = www.sociofitechnology.com) {
      return 301 https://sociofitechnology.com$request_uri;
    }

    # Block direct access to /admin from the main domain
    # All admin work must go through superadmin.sociofitechnology.com
    location /admin {
      return 301 https://superadmin.sociofitechnology.com$request_uri;
    }

    # Redirect /cms/* to cms.sociofitechnology.com — CMS has its own subdomain
    location /cms {
      return 301 https://cms.sociofitechnology.com$request_uri;
    }

    # Proxy everything else to Next.js
    location / {
      limit_req zone=general burst=50 nodelay;

      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;

      # Cache static Next.js assets
      location ~* \.(js|css|woff2?|ico|png|jpg|webp|svg)$ {
        proxy_pass http://nextjs;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 1y;
        add_header Cache-Control "public, immutable";
      }
    }
  }

  # ── Admin panel: superadmin.sociofitechnology.com ─────────────────────────
  server {
    listen 443 ssl http2;
    server_name superadmin.sociofitechnology.com;

    ssl_certificate     /etc/letsencrypt/live/sociofitechnology.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sociofitechnology.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Stricter security headers for admin
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: *.supabase.co; connect-src 'self' *.supabase.co wss://*.supabase.co;" always;

    # Apply stricter rate limiting to admin
    limit_req zone=admin burst=20 nodelay;

    # Proxy to the same Next.js container.
    # Middleware detects the superadmin.* hostname and rewrites paths to /admin/*.
    location / {
      proxy_pass http://nextjs;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 120s;

      # Pass the original host so Next.js middleware can detect the subdomain
      proxy_set_header X-Forwarded-Host $host;
    }
  }

  # ── CMS: cms.sociofitechnology.com ────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name cms.sociofitechnology.com;

    ssl_certificate     /etc/letsencrypt/live/sociofitechnology.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sociofitechnology.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;

    # Strict security headers — CMS is internal-facing
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob: *.supabase.co https:; connect-src 'self' *.supabase.co wss://*.supabase.co;" always;

    # Stricter rate limiting — content editors only
    limit_req zone=admin burst=20 nodelay;

    # Root redirect — app lives at /cms/ (basePath)
    location = / {
      return 302 /cms/;
    }

    location / {
      proxy_pass http://cms;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 120s;

      # Larger body size for media uploads
      client_max_body_size 50M;
    }
  }
}
