version: '3.9'

# SocioFi Technology — Production Docker Compose
# Supabase and PostgreSQL are hosted on Supabase Cloud.
# Resend, Anthropic, and Stripe are external APIs.
#
# Public domains:
#   sociofitechnology.com            → Next.js public website
#   superadmin.sociofitechnology.com → Next.js admin panel
#   cms.sociofitechnology.com        → Next.js CMS (apps/cms)
#
# Run: docker compose up -d

services:

  # ── nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sociofi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      admin:
        condition: service_healthy
      cms:
        condition: service_healthy
    networks:
      - sociofi

  # ── Certbot (SSL certificate renewal) ───────────────────────────────────
  # Run once to issue certs:
  #   docker compose run --rm certbot certonly --webroot -w /var/www/certbot \
  #     -d sociofitechnology.com -d www.sociofitechnology.com \
  #     -d superadmin.sociofitechnology.com \
  #     -d cms.sociofitechnology.com
  # Auto-renews on container start (add to crontab for periodic renewal).
  certbot:
    image: certbot/certbot:latest
    container_name: sociofi-certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    networks:
      - sociofi

  # ── Next.js (public website + admin panel) ───────────────────────────────
  # Not exposed directly — traffic comes through nginx only.
  # Serves:
  #   sociofitechnology.com/*            → public site
  #   superadmin.sociofitechnology.com/* → /admin/* (via middleware rewrite)
  admin:
    build:
      context: ./sociofi-website
      dockerfile: Dockerfile
    container_name: sociofi-admin
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - ./sociofi-website/.env.production
    environment:
      NODE_ENV: production
      DOCKER_BUILD: "true"
      NEXUS_API_URL: http://nexus:8001
    depends_on:
      - nexus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sociofi

  # ── CMS (cms.sociofitechnology.com) ─────────────────────────────────────
  # Standalone Next.js app for content editors.
  # Not exposed directly — traffic comes through nginx only.
  cms:
    build:
      context: ./apps/cms
      dockerfile: Dockerfile
    container_name: sociofi-cms
    restart: unless-stopped
    expose:
      - "3001"
    env_file:
      - ./apps/cms/.env.production
    environment:
      NODE_ENV: production
      PORT: "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/cms/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sociofi

  # ── NEXUS FastAPI Agent Server ───────────────────────────────────────────
  # Internal only — not exposed to the internet.
  # Next.js calls it via http://nexus:8001 on the Docker network.
  nexus:
    build:
      context: ./sociofi-nexus
      dockerfile: Dockerfile
    container_name: sociofi-nexus
    restart: unless-stopped
    expose:
      - "8001"
    env_file:
      - ./sociofi-nexus/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - sociofi

  # ── Celery Workers (3 concurrent workers) ───────────────────────────────
  celery:
    build:
      context: ./sociofi-nexus
      dockerfile: Dockerfile
    container_name: sociofi-celery
    restart: unless-stopped
    command: celery -A celery_app worker --loglevel=info --concurrency=3 -Q default,high_priority,email
    env_file:
      - ./sociofi-nexus/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      nexus:
        condition: service_healthy
    networks:
      - sociofi

  # ── Celery Beat Scheduler ────────────────────────────────────────────────
  celery-beat:
    build:
      context: ./sociofi-nexus
      dockerfile: Dockerfile
    container_name: sociofi-celery-beat
    restart: unless-stopped
    command: celery -A celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    env_file:
      - ./sociofi-nexus/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - sociofi

  # ── Redis (Queue + Cache) ────────────────────────────────────────────────
  # Internal only — not exposed outside Docker network.
  redis:
    image: redis:7-alpine
    container_name: sociofi-redis
    restart: unless-stopped
    expose:
      - "6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - sociofi

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  redis_data:
    driver: local

# ── Networks ─────────────────────────────────────────────────────────────────

networks:
  sociofi:
    driver: bridge
