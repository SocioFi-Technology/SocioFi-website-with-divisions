name: Deploy to VPS (dev)

on:
  push:
    branches: [dev]

jobs:
  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build website
        run: pnpm --filter sociofi-website build
        env:
          # Dummy values — enough for type-check and static build
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          ANTHROPIC_API_KEY: sk-ant-placeholder
          NEXUS_API_URL: http://localhost:8000
          NEXUS_API_KEY: placeholder
          REVALIDATE_SECRET: placeholder
          NEXT_PUBLIC_APP_URL: https://sociofitechnology.com

      - name: Build CMS
        run: pnpm --filter @sociofitechnology/cms build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-check   # Only deploy if build passes
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_IP }}
          username: sociofi
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/sociofitechnology
            git pull origin dev
            docker compose up -d --build --remove-orphans
            docker system prune -f
