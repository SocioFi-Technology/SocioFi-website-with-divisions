<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;padding:0}
  .wrap{max-width:560px;margin:40px auto;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.07)}
  .header{background:linear-gradient(135deg,#3A589E 0%,#59A392 100%);padding:28px 36px}
  .header h1{color:#fff;font-size:20px;margin:0;letter-spacing:-.02em}
  .body{padding:32px 36px;color:#334155;font-size:15px;line-height:1.7}
  .body p{margin:0 0 16px}
  .cta{display:inline-block;background:linear-gradient(135deg,#3A589E,#59A392);color:#fff;text-decoration:none;padding:12px 28px;border-radius:8px;font-weight:600;font-size:14px;margin:8px 0 24px}
  .footer{padding:16px 36px;background:#f8fafc;font-size:12px;color:#94a3b8;border-top:1px solid #e2e8f0}
  .footer a{color:#64748b}
</style>
</head>
<body>
<div class="wrap">
  <div class="header"><h1>SocioFi Technology</h1></div>
  <div class="body">{% block body %}{% endblock %}</div>
  <div class="footer">
    <p>SocioFi Technology &middot; Dhaka, Bangladesh &middot; <a href="{{ site_url }}">sociofitechnology.com</a></p>
    <p><a href="{{ unsubscribe_url }}">Unsubscribe</a></p>
  </div>
</div>
</body>
</html>
